<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCFHS Mock Test Simulator| Maternity and Pediatric</title>
    <style>
        :root {
            --primary: #1a2a6c;
            --secondary: #b21f1f;
            --accent: #fdbb2d;
            --bg: #f8f9fa;
            --text: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            color: var(--text);
        }

        /* SCREEN MANAGEMENT */
        .screen { display: none; padding: 20px; max-width: 900px; margin: auto; }
        .active { display: block; }

        /* WELCOME SCREEN */
        .welcome-card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            margin-top: 100px;
        }

        input[type="text"] {
            padding: 12px;
            width: 80%;
            margin: 20px 0;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 1rem;
        }

        /* HEADER EXAM */
        .exam-header {
            background: var(--primary);
            color: white;
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        /* QUIZ CARD */
        .quiz-card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-top: 20px;
        }

        .vignette {
            font-size: 1.2rem;
            font-weight: 600;
            line-height: 1.6;
            margin-bottom: 25px;
            border-left: 5px solid var(--secondary);
            padding-left: 15px;
        }

        .options-grid {
            display: grid;
            gap: 12px;
        }

        .opt {
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            background: #fff;
            font-weight: 500;
        }

        .opt:hover { background: #f0f4ff; border-color: var(--primary); }
        .opt.selected { background: var(--primary); color: white; border-color: var(--primary); }

        /* RATIONALE */
        #rationale-area {
            margin-top: 20px;
            padding: 20px;
            background: #fff3cd;
            border-radius: 8px;
            display: none;
            border: 1px solid #ffeeba;
        }

        /* BUTTONS */
        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
        }

        .btn-start { background: var(--primary); color: white; }
        .btn-next { background: #28a745; color: white; }
        .btn-rationale { background: var(--accent); color: #333; }

        /* RESULTS */
        .result-card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            margin-top: 50px;
        }

        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            line-height: 150px;
            font-size: 2.5rem;
            margin: 20px auto;
        }
    </style>
</head>
<body>

    <div id="welcome-screen" class="screen active">
        <div class="welcome-card">
            <h1>SCFHS MOCK TEST V2</h1>
            <p>Nursing Licensure Examination - Clinical Specialty</p>
            <input type="text" id="candidate-name" placeholder="Enter Full Name (e.g., Nurse Ahmad)">
            <br>
            <button class="btn btn-start" onclick="startExam()">Start Mock Test</button>
        </div>
    </div>

    <div id="exam-screen" class="screen">
        <div class="exam-header">
            <div>Candidate: <strong id="display-name"></strong></div>
            <div id="progress-text">Q 1/100</div>
            <div id="timer-text">00:00</div>
        </div>

        <div class="quiz-card">
            <div id="vignette" class="vignette"></div>
            <div id="options" class="options-grid"></div>

            <div id="rationale-area"></div>

            <div style="margin-top: 30px; display: flex; gap: 10px;">
                <button class="btn btn-rationale" onclick="showRationale()">Rationale</button>
                <button class="btn btn-next" onclick="nextQuestion()">Next Question</button>
            </div>
        </div>
    </div>

    <div id="result-screen" class="screen">
        <div class="result-card">
            <h2>Exam Completed!</h2>
            <div id="score-display" class="score-circle">0%</div>
            <p id="feedback-text"></p>
            <button class="btn btn-start" onclick="location.reload()">Retake Exam</button>
        </div>
    </div>

    <script>
        // DATABASE SOAL (Bisa Anda tambah sampai ribuan)
        const rawQuestions = [

        let seconds = 0;

        // FUNGSI ROLLING / SHUFFLE
        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function startExam() {
            const name = document.getElementById('candidate-name').value;
            if (!name) return alert("Please enter your name!");

            document.getElementById('display-name').innerText = name;
            document.getElementById('welcome-screen').classList.remove('active');
            document.getElementById('exam-screen').classList.add('active');

            // Persiapkan Soal (Acak)
            examQuestions = shuffle([...rawQuestions]);
            currentIdx = 0;
            score = 0;
            
            startTimer();
            renderQuestion();
        }

        function startTimer() {
            timer = setInterval(() => {
                seconds++;
                let m = Math.floor(seconds / 60).toString().padStart(2, '0');
                let s = (seconds % 60).toString().padStart(2, '0');
                document.getElementById('timer-text').innerText = `${m}:${s}`;
            }, 1000);
        }

        function renderQuestion() {
            const q = examQuestions[currentIdx];
            document.getElementById('progress-text').innerText = `Q ${currentIdx + 1}/${examQuestions.length}`;
            document.getElementById('vignette').innerText = q.v;
            document.getElementById('rationale-area').style.display = 'none';
            
            const optionsDiv = document.getElementById('options');
            optionsDiv.innerHTML = '';

            ['a', 'b', 'c', 'd'].forEach(key => {
                const btn = document.createElement('div');
                btn.className = 'opt';
                btn.innerText = `${key.toUpperCase()}. ${q[key]}`;
                btn.onclick = () => selectAnswer(btn, key.toUpperCase());
                optionsDiv.appendChild(btn);
            });
        }

        let selectedAns = null;
        function selectAnswer(el, val) {
            document.querySelectorAll('.opt').forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
            selectedAns = val;
        }

        function showRationale() {
            const q = examQuestions[currentIdx];
            const area = document.getElementById('rationale-area');
            area.style.display = 'block';
            area.innerHTML = `<strong>Correct Answer: ${q.k}</strong><br>${q.r}`;
        }

        function nextQuestion() {
            if (!selectedAns) return alert("Please select an answer first!");

            // Cek Jawaban
            if (selectedAns === examQuestions[currentIdx].k) {
                score++;
            }

            selectedAns = null;
            currentIdx++;

            if (currentIdx < examQuestions.length) {
                renderQuestion();
            } else {
                finishExam();
            }
        }

        function finishExam() {
            clearInterval(timer);
            document.getElementById('exam-screen').classList.remove('active');
            document.getElementById('result-screen').classList.add('active');
            
            const finalScore = Math.round((score / examQuestions.length) * 100);
            document.getElementById('score-display').innerText = `${finalScore}%`;
            
            let feedback = finalScore >= 70 ? "Excellent! You are ready for the Prometric." : "Keep studying. You need at least 70% to pass.";
            document.getElementById('feedback-text').innerText = feedback;
        }
    </script>
</body>
</html>
